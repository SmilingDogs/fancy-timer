<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>World Times & Timers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body class="bg-gray-100 min-h-screen relative overflow-hidden">
    <!-- Swiper container -->
    <div class="swiper h-screen w-full">
      <div class="swiper-wrapper">
        <!-- First Slide - Timer -->
        <div class="swiper-slide relative">
          <!-- Background container -->
          <div
            class="absolute inset-0 bg-no-repeat bg-cover z-100 top-0 left-0 w-full"
            id="background"
          ></div>
          <!-- Main content container -->
          <div
            class="relative z-500 flex items-center justify-center min-h-screen p-4"
          >
            <!-- Stopwatch/Timer container -->
            <div
              class="left-side bg-[#0f172a] px-8 py-4 rounded-lg shadow-xl text-center timer-container"
            >
              <!-- Timer Display -->
              <div
                id="display"
                class="text-6xl 3xl:text-7xl font-['Orbitron'] mb-6 timer-display"
              >
                00:00:00
              </div>
              <!-- Timer control buttons -->
              <div
                class="timer-controls flex justify-start 3xl:text-2xl space-x-4 mb-6"
              >
                <button
                  id="startBtn"
                  class="btn-primary bg-transparent text-black"
                >
                  Start
                </button>
                <button
                  id="stopBtn"
                  class="btn-secondary bg-transparent text-black"
                >
                  Stop
                </button>
                <button
                  id="resetBtn"
                  class="btn-danger bg-transparent text-black"
                >
                  Reset
                </button>
                <button
                  id="lapBtn"
                  class="btn-primary bg-transparent text-black"
                >
                  Lap
                </button>
              </div>
              <!-- Laps recordings -->
              <div class="text-left max-h-30 overflow-y-auto 3xl:text-xl">
                <ul id="laps" class="text-600 space-y-2"></ul>
              </div>

              <div class="flex justify-start gap-6 items-center mt-4">
                <!-- Rain Toggle button -->
                <div class="flex justify-end pb-4">
                  <label
                    class="relative inline-block w-30 3xl:w-36 h-10 3xl:h-14 hover:cursor-pointer"
                  >
                    <input
                      type="checkbox"
                      id="rainToggle"
                      class="peer hidden"
                    />

                    <!-- Background -->
                    <span
                      class="block w-full h-full bg-[#0f172a] border-1 border-white rounded-full peer-checked:bg-blue-600 transition-colors duration-300"
                    ></span>
                    <!-- Toggle circle -->
                    <span
                      class="absolute top-1 left-2 3xl:top-2 w-8 3xl:w-10 h-8 3xl:h-10 bg-white rounded-full shadow-md transition-transform duration-300 peer-checked:translate-x-18 3xl:peer-checked:translate-x-22"
                    ></span>
                    <!-- RAIN text -->
                    <span
                      class="3xl:text-base absolute right-4 top-1/2 transform -translate-y-1/2 text-[12px] font-bold text-white opacity-100 peer-checked:opacity-0 transition-opacity duration-300 z-10 tracking-widest"
                    >
                      Rain!
                    </span>
                    <!-- NO RAIN text -->
                    <span
                      class="3xl:text-base absolute left-3 top-1/2 transform -translate-y-1/2 text-[12px] font-bold text-white opacity-0 peer-checked:opacity-100 transition-opacity duration-300 z-10 tracking-widest"
                    >
                      No Rain
                    </span>
                  </label>
                </div>
                <!-- Mode Toggle button -->
                <div class="flex justify-end pb-4">
                  <label
                    class="relative inline-block w-34 3xl:w-43 h-10 3xl:h-14 hover:cursor-pointer"
                  >
                    <input
                      type="checkbox"
                      id="modeToggle"
                      class="peer hidden"
                    />

                    <!-- Background -->
                    <span
                      class="block w-full h-full bg-[#0f172a] border-1 border-white rounded-full peer-checked:bg-blue-600 transition-colors duration-300"
                    ></span>
                    <!-- Toggle circle -->
                    <span
                      class="absolute top-1 3xl:top-2 left-2 w-8 3xl:w-10 h-8 3xl:h-10 bg-white rounded-full shadow-md transition-transform duration-300 peer-checked:translate-x-22 3xl:peer-checked:translate-x-29"
                    ></span>
                    <!-- Timer text -->
                    <span
                      class="3xl:text-base absolute right-4 3xl:right-10 top-1/2 transform -translate-y-1/2 text-[12px] font-bold text-white opacity-100 peer-checked:opacity-0 transition-opacity duration-300 z-10 tracking-widest"
                    >
                      Timer
                    </span>
                    <!-- Countdown text -->
                    <span
                      class="3xl:text-base absolute top-1/2 left-2.5 3xl:left-2 transform -translate-y-1/2 text-[12px] font-bold text-white opacity-0 peer-checked:opacity-100 transition-opacity duration-300 z-10 tracking-widest"
                    >
                      Countdown
                    </span>
                  </label>
                </div>
              </div>
              <div class="flex justify-start items-center gap-6 mt-4">
                <span class="text-white 3xl:text-xl">Theme</span>
                <!-- Timer colors selector -->
                <div class="flex justify-end 3xl:text-xl">
                  <select
                    id="colorSelector"
                    class="px-4 py-3 rounded-lg shadow-md text-white bg-[#0f172a] border border-gray-300 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                  >
                    <option value="text-black">Black</option>
                    <option value="text-white">White</option>
                    <option value="text-yellow-500">Yellow</option>
                    <option value="text-blue-500">Blue</option>
                    <option value="text-red-500">Red</option>
                  </select>
                </div>
              </div>
              <!-- Thumbnail gallery  -->
              <div class="flex space-x-2 z-500 mt-8" id="thumbnailsContainer">
                <img
                  src="/assets/amalfi-night.webp"
                  alt="Background 2"
                  data-bg="/assets/amalfi-night.webp"
                  class="w-16 3xl:w-20 h-16 3xl:h-20 rounded-lg cursor-pointer hover:scale-110 transition-transform pointer-events-auto"
                />
                <img
                  src="/assets/bridge.webp"
                  alt="Background 3"
                  data-bg="/assets/bridge.webp"
                  class="w-16 3xl:w-20 h-16 3xl:h-20 rounded-lg cursor-pointer hover:scale-110 transition-transform pointer-events-auto"
                />
                <img
                  src="/assets/desert.webp"
                  alt="Background 4"
                  data-bg="/assets/desert.webp"
                  class="w-16 3xl:w-20 h-16 3xl:h-20 rounded-lg cursor-pointer hover:scale-110 transition-transform pointer-events-auto"
                />
                <img
                  src="/assets/cave.webp"
                  alt="Background 5"
                  data-bg="/assets/cave.webp"
                  class="w-16 3xl:w-20 h-16 3xl:h-20 rounded-lg cursor-pointer hover:scale-110 transition-transform pointer-events-auto"
                />
                <img
                  src="/assets/waterfall.webp"
                  alt="Background 6"
                  data-bg="/assets/waterfall.webp"
                  class="w-16 3xl:w-20 h-16 3xl:h-20 rounded-lg cursor-pointer hover:scale-110 transition-transform pointer-events-auto"
                />
              </div>

              <audio
                id="beep"
                src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
              ></audio>
            </div>
            <div
              class="right-side flex flex-col items-center justify-center bg-[#0f172a] ml-6 px-8 py-4 rounded-lg text-center"
            >
              <!--Circular timer animation-->
              <!--prettier-ignore-->
              <div class="circular-timer animatable opacity-0 pointer-events-none translate-y-4 transition-all duration-500 ease-in-out ">
              <svg>
                <circle cx="50%" cy="50%" r="90" />
                <circle cx="50%" cy="50%" r="90" pathLength="1" data-circle />
                <text x="100" y="100" text-anchor="middle">
                  <tspan
                    id="no"
                    class="font-['Orbitron'] text-3xl fill-white hidden"
                    >
                       No
                  </tspan>
                  <tspan
                    id="timeLeft"
                    class="font-['Orbitron'] text-xl fill-white"
                    >
                      time left
                  </tspan>
                </text>
              </svg>
            </div>
              <!-- Countdown Settings Panel -->
              <div
                id="countdownPanel"
                class="ml-4 h-full opacity-0 pointer-events-none translate-y-4 transition-all duration-500 ease-in-out flex flex-col justify-center space-y-6 3xl:space-y-10"
              >
                <div class="flex flex-col items-center gap-2 3xl:gap-4">
                  <div
                    class="text-sm text-white font-['Orbitron'] 3xl:text-2xl"
                  >
                    Hours
                  </div>
                  <input
                    type="range"
                    min="0"
                    max="24"
                    value="0"
                    class="vertical-slider w-32 h-2 3xl:w-48 3xl:h-4"
                    id="hourSlider"
                  />
                </div>
                <div class="flex flex-col items-center gap-2 3xl:gap-4">
                  <div
                    class="text-sm text-white font-['Orbitron'] 3xl:text-2xl"
                  >
                    Minutes
                  </div>
                  <input
                    type="range"
                    min="0"
                    max="59"
                    value="0"
                    class="vertical-slider w-32 h-2 3xl:w-48 3xl:h-4"
                    id="minuteSlider"
                  />
                </div>
                <div class="flex flex-col items-center gap-2 3xl:gap-4">
                  <div
                    class="text-sm text-white font-['Orbitron'] 3xl:text-2xl"
                  >
                    Seconds
                  </div>
                  <input
                    type="range"
                    min="0"
                    max="59"
                    value="1"
                    class="vertical-slider w-32 h-2 3xl:w-48 3xl:h-4"
                    id="secondSlider"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Second Slide - Global Times -->
        <div class="swiper-slide relative">
          <!-- Background with particles -->
          <div
            id="particles-js"
            class="absolute inset-0 w-full h-full z-1"
          ></div>
          <div
            class="absolute inset-0 bg-no-repeat bg-cover bg-center z-0 bg-[url(/assets/earth.webp)]"
          ></div>
          <!-- Global Time slide content -->
          <div
            class="flex flex-col items-center justify-center min-h-screen p-6"
          >
            <div class="relative flex items-start gap-4">
              <h1
                class="text-3xl 3xl:text-5xl font-bold text-white mb-3 3xl:mb-6 z-2"
              >
                World Times
              </h1>
              <button
                id="infoToggle"
                class="w-6 h-6 rounded-full border border-white text-white text-sm font-bold flex items-center justify-center hover:bg-white hover:text-[#0f172a] transition hover:cursor-pointer z-2"
                title="How it works"
              >
                i
              </button>
              <div
                id="infoTooltip"
                class="absolute right-[-300px] top-[20px] w-5/4 hidden mt-2 text-sm text-gray-300 bg-[#0f172a] bg-opacity-80 p-4 rounded-lg shadow-md max-w-xl z-10"
              >
                🌍 Welcome to World Times! Spin the Globe, hover over a country
                or city ( in mutiple time zone countries ) to see its current
                local time. Click a country to pin its live clock below.
              </div>
            </div>

            <!-- 2D World Map -->
            <!-- <div
              id="worldMap"
              class="w-full xl:max-w-5xl max-w-4xl xl:h-[475px] h-[375px] rounded-lg overflow-hidden bg-transparent z-5"
            ></div> -->
            <!-- 3D Globus -->
            <div
              id="globeDiv"
              class="w-2/3 3xl:w-1/2 h-[475px] 3xl:h-[575px] z-5"
            ></div>

            <!-- Live Times Section -->
            <div
              id="recentTimesSection"
              class="mt-2 3xl:mt-4 w-full flex justify-center min-w-4xl h-[125px] 3xl:h-[150px] px-2 3xl:px-4 z-5"
            >
              <div class="flex items-start">
                <div class="flex flex-col items-end">
                  <span
                    class="text-white text-xl 3xl:text-2xl font-semibold hidden"
                    id="recentTimesTitle"
                    >Live Times:
                  </span>
                  <!-- Time Format toggle -->
                  <div class="pt-3 pb-3 hidden" id="timeFormat">
                    <label
                      class="relative inline-block w-24 3xl:w-30 h-10 3xl:h-12 hover:cursor-pointer"
                    >
                      <!--prettier-ignore-->
                      <input type="checkbox" id="timeFormatToggle" class="peer hidden" />
                      <!-- Background -->
                      <span
                        class="block w-full h-full bg-gray-300 rounded-full peer-checked:bg-[#60a5fa] transition-colors duration-300"
                      ></span>
                      <!-- Toggle circle -->
                      <span
                        class="absolute top-1 left-2 w-8 3xl:w-10 h-8 3xl:h-10 bg-white rounded-full shadow-md transition-transform duration-300 peer-checked:translate-x-13 3xl:peer-checked:translate-x-16"
                      ></span>
                      <!-- 24H text -->
                      <span
                        class="absolute right-4 top-1/2 transform -translate-y-1/2 text-xs 3xl:text-base font-bold text-[#0f172a] opacity-100 peer-checked:opacity-0 transition-opacity duration-300 z-10 tracking-widest"
                      >
                        24H
                      </span>
                      <!-- AM/PM text -->
                      <span
                        class="absolute left-2 top-1/2 transform -translate-y-1/2 text-[10px] 3xl:text-sm font-bold text-[#0f172a] opacity-0 peer-checked:opacity-100 transition-opacity duration-300 z-10 tracking-widest"
                      >
                        AM/PM
                      </span>
                    </label>
                  </div>
                  <button
                    class="bg-[#60a5fa] text-[#0f172a] px-1 py-2 hidden rounded-md w-full text-l 3xl:text-lg hover:cursor-pointer"
                    id="removeCardsBtn"
                  >
                    Remove
                  </button>
                </div>
                <div
                  id="recentTimes"
                  class="w-[860px] 3xl:min-w-4xl h-[125px] 3xl:h-[155px] flex justify-end xl:gap-4 gap-3 flex-wrap overflow-y-auto xl:pr-4 pr-2"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Pagination -->
      <div class="swiper-pagination flex flex-col gap-4 pr-2"></div>
    </div>
    <!-- Library scripts  -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rainyday.js@0.1.7/dist/rainyday.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
